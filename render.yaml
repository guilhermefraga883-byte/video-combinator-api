services:
  - type: web
    name: video-combinator-api
    env: python
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg
      pip install -r requirements.txt
    startCommand: gunicorn app:app --timeout 300 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
